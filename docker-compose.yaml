services:
    taskflow-postgres:
        image: postgres:18.1-bookworm
        container_name: taskflow-env-postgres
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        ports:
            - "5432:5432"
        volumes:
            - ./out/pgdata:/var/lib/postgresql
        restart: always
    taskflow-postgres-migrate:
        image: migrate/migrate:v4.19.1
        volumes:
            - ./migrations:/migrations